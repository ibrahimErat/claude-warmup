name: Claude Warmup (2 hesap)

on:
  schedule:
    - cron: '7,37 * * * *'     # her 30 dk (:07 ve :37 UTC) — saat başı yoğunluğundan kaçınır, boşluk bırakmaz
  workflow_dispatch:            # gerektiğinde elle tetikleme

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false          # bir hesabın hatası diğerini iptal etmesin
      matrix:
        token: [CLAUDE_OAUTH_TOKEN_A, CLAUDE_OAUTH_TOKEN_B]
    steps:
      - name: Claude Code kur
        run: npm install -g @anthropic-ai/claude-code
      - name: Warmup mesaji
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[matrix.token] }}
        run: claude -p "hi" --model haiku --no-session-persistence || true
